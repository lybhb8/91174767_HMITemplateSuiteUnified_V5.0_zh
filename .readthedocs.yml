version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  apt_packages:
    - graphviz

sphinx:
  configuration: docs/conf.py
  builder: html

# 可选：生成 PDF 格式文档
#formats:
#- pdf


python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
      extra_requirements:
        - docs



